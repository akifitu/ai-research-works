name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  project-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - agentic-ablation-benchmark
          - bandit-policy-evaluation-lab
          - ranking-recommender-lab
          - multimodal-retrieval-lab
          - citation-grounding-lab
          - tool-trajectory-audit-lab
          - long-context-stress-lab
          - prompt-rubric-distillation-lab
          - multi-hop-evidence-mapper
          - vision-evaluation-lab
          - nlp-semantic-evaluation-lab
          - tabular-ml-reliability-lab
          - time-series-forecasting-lab
          - mlops-experiment-registry-lab
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project package
        run: pip install ./projects/${{ matrix.project }}

      - name: Run unit tests
        run: python -m unittest discover -s projects/${{ matrix.project }}/tests -p "test_*.py"
