name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  citation-grounding-lab:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project package
        run: pip install ./projects/citation-grounding-lab

      - name: Run unit tests
        run: python -m unittest discover -s projects/citation-grounding-lab/tests -p "test_*.py"

